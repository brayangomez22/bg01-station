name: Deploy BG-01 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by the admin panel (via the API) after a content edit, so a publish
  # rebuilds the static site with the latest content from the database.
  repository_dispatch:
    types: [content-updated]

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub forces Node 24 for JS actions from 2026-06-16; opt in early so the
# pipeline is verified on it before the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Pull the latest content from the API into src/content/_generated/ before
      # building. Best-effort: if the API is unreachable the script exits 0 and
      # the build falls back to the committed snapshot, so a deploy never fails
      # on API downtime.
      - run: npm run sync:content
        env:
          API_BASE: ${{ vars.API_BASE || 'https://api.brayangomez.dev' }}
      # VITE_API_BASE_URL is baked into the bundle so /control talks to the
      # production API (not the localhost dev fallback).
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE || 'https://api.brayangomez.dev' }}
      # SPA fallback: GitHub Pages serves 404.html for unknown paths, so a
      # copy of index.html lets deep links (/missions, /archive/…) boot the
      # router instead of erroring.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
