<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="ui-monospace, Menlo, Consolas, monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#38e1ff" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#0b0e16"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <rect x="24" y="24" width="1152" height="627" fill="none" stroke="#1e2740"/>
  <path d="M24 64V24H64" fill="none" stroke="#ffb547" stroke-opacity="0.6" stroke-width="2"/>
  <path d="M1136 24H1176V64" fill="none" stroke="#ffb547" stroke-opacity="0.6" stroke-width="2"/>
  <path d="M1176 611V651H1136" fill="none" stroke="#ffb547" stroke-opacity="0.6" stroke-width="2"/>
  <path d="M64 651H24V611" fill="none" stroke="#ffb547" stroke-opacity="0.6" stroke-width="2"/>

  <!-- motif: climate telemetry — emission sources, aggregation, monitoring panel -->
  <g transform="translate(210,280)">
    <!-- data sources -->
    <g stroke="#38e1ff" fill="none">
      <circle cx="20" cy="0" r="16"/>
      <circle cx="20" cy="60" r="16"/>
      <circle cx="20" cy="120" r="16"/>
    </g>
    <text x="20" y="158" fill="#5c6680" font-size="12" text-anchor="middle" letter-spacing="2">FUENTES</text>
    <!-- intake links -->
    <g stroke="#38e1ff" stroke-width="2" fill="none" stroke-opacity="0.6">
      <path d="M36 0 120 56"/>
      <path d="M36 60 120 60"/>
      <path d="M36 120 120 64"/>
    </g>
    <!-- aggregation core -->
    <path d="M140 20 220 20 240 60 220 100 140 100 120 60Z" fill="#0b0e16" stroke="#38e1ff" stroke-width="2"/>
    <text x="180" y="66" fill="#38e1ff" font-size="14" text-anchor="middle">API</text>
    <text x="180" y="158" fill="#5c6680" font-size="12" text-anchor="middle" letter-spacing="2">NESTJS</text>
    <!-- chevrons to panel -->
    <g stroke="#38e1ff" stroke-width="2" fill="none" stroke-opacity="0.7">
      <path d="M256 60 280 60 M272 48 286 60 272 72"/>
    </g>
    <!-- monitoring panel: descending emissions trend + gauge -->
    <g transform="translate(310,-30)">
      <rect x="0" y="0" width="360" height="200" fill="#0b0e16" stroke="#38e1ff"/>
      <text x="16" y="28" fill="#5c6680" font-size="12" letter-spacing="2">HUELLA · tCO2e</text>
      <!-- axes -->
      <path d="M40 56 40 168 320 168" fill="none" stroke="#1e2740"/>
      <!-- declining trend line -->
      <path d="M48 76 110 96 172 92 234 132 296 150" fill="none" stroke="#ffb547" stroke-width="2"/>
      <g fill="#ffb547">
        <circle cx="48" cy="76" r="3"/>
        <circle cx="110" cy="96" r="3"/>
        <circle cx="172" cy="92" r="3"/>
        <circle cx="234" cy="132" r="3"/>
        <circle cx="296" cy="150" r="3"/>
      </g>
      <!-- gauge -->
      <path d="M250 60 A40 40 0 0 1 330 60" fill="none" stroke="#38e1ff" stroke-opacity="0.5"/>
      <path d="M250 60 A40 40 0 0 1 300 26" fill="none" stroke="#38e1ff" stroke-width="2"/>
    </g>
  </g>

  <!-- mission band -->
  <text x="64" y="572" fill="#ffb547" font-size="13" letter-spacing="3">KIMSA · CONSULTORÍA DE CAMBIO CLIMÁTICO · 2021—2022</text>

  <text x="64" y="96" fill="#38e1ff" font-size="26" letter-spacing="6">M-006</text>
  <text x="64" y="130" fill="#a9b2c7" font-size="15" letter-spacing="3">SISTEMAS KIMSA · INTELIGENCIA CLIMÁTICA</text>
  <text x="64" y="156" fill="#5c6680" font-size="13" letter-spacing="2">NESTJS · ANGULAR · REACT</text>

  <text x="64" y="615" fill="#5c6680" font-size="12" letter-spacing="3">BG-01 STATION ARCHIVE · STATUS: COMPLETED</text>
  <text x="1136" y="615" fill="#ffb547" font-size="12" letter-spacing="3" text-anchor="end" opacity="0.7">MISIÓN DE DOMINIO CLIMÁTICO</text>
</svg>
